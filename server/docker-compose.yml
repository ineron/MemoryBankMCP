services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: memory-mcp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory_bank
    ports:
      - "5433:5432"
    volumes:
      - memory_mcp_pgdata:/var/lib/postgresql/data
      - ./memory_mcp/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory_bank"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  memory_mcp_pgdata:
